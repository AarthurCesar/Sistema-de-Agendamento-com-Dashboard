# Blueprint do Render — provisiona o banco PostgreSQL e o web service (API + frontend).
# No Render: New + → Blueprint → conecte este repositório.
services:
  - type: web
    name: sistema-agendamento
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true # o Render gera um segredo forte automaticamente
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: APP_TIMEZONE
        value: America/Sao_Paulo
      - key: WHATSAPP_PROVIDER
        value: mock
      - key: DATABASE_URL
        fromDatabase:
          name: agendamento-db
          property: connectionString

databases:
  - name: agendamento-db
    plan: free
    region: oregon
